name: norify

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: norify
      POSTGRES_USER: norify
      POSTGRES_PASSWORD: norify
    ports:
      - "5432:5432"
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U norify -d norify"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres-viewer:
    image: sosedoff/pgweb:latest
    restart: unless-stopped
    command:
      - --bind=0.0.0.0
      - --listen=8081
      - --url=postgres://norify:norify@postgres:5432/norify?sslmode=disable
    ports:
      - "8089:8081"
    depends_on:
      postgres:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./deploy/docker-compose/rabbitmq-definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./deploy/docker-compose/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8080
      JWT_SECRET: local-dev-secret
      POSTGRES_DSN: postgres://norify:norify@postgres:5432/norify?sslmode=disable
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy

  template-service:
    build:
      context: .
      dockerfile: services/template-service/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgres://norify:norify@postgres:5432/norify?sslmode=disable
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy

  channel-service:
    build:
      context: .
      dockerfile: services/channel-service/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgres://norify:norify@postgres:5432/norify?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8084:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  campaign-service:
    build:
      context: .
      dockerfile: services/campaign-service/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgres://norify:norify@postgres:5432/norify?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DISPATCH_BATCH_SIZE: 50000
    ports:
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  dispatcher-service:
    build:
      context: .
      dockerfile: services/dispatcher-service/Dockerfile
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      CAMPAIGN_SERVICE_URL: http://campaign-service:8080
      DISPATCHER_WORKERS: 4
    ports:
      - "8086:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy

  sender-worker:
    build:
      context: .
      dockerfile: services/sender-worker/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgres://norify:norify@postgres:5432/norify?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      WORKER_PREFETCH: 20
      WORKER_MIN_POOL: 1
      WORKER_MAX_POOL: 20
      WORKER_SCALE_INTERVAL_SECONDS: 5
      WORKER_SCALE_MAX_DEPTH: 200
      CHANNEL_STUB_MIN_DELAY_SECONDS: 1
      CHANNEL_STUB_MAX_DELAY_SECONDS: 3
    ports:
      - "8087-8095:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-error-service:
    build:
      context: .
      dockerfile: services/notification-error-service/Dockerfile
    restart: unless-stopped
    ports:
      - "8088:8080"

  stats-service:
    image: norify-stats-service:latest
    build:
      context: .
      dockerfile: services/stats-service/Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgres://norify:norify@postgres:5432/norify?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      STATS_REFRESH_SECONDS: 5
    ports:
      - "8092:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ops-gateway:
    build:
      context: ./apps/ops-gateway
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      AUTH_SERVICE_URL: http://auth-service:8080
      USER_SERVICE_URL: http://user-service:8080
      CAMPAIGN_SERVICE_URL: http://campaign-service:8080
      CHANNEL_SERVICE_URL: http://channel-service:8080
      TEMPLATE_SERVICE_URL: http://template-service:8080
      DISPATCHER_SERVICE_URL: http://dispatcher-service:8080
      SENDER_SERVICE_URL: http://sender-worker:8080
      SENDER_WORKER_REPLICAS: 1
      WORKER_CONTROL_MODE: disabled
      WORKER_CONTROL_MIN_REPLICAS: 1
      WORKER_CONTROL_MAX_REPLICAS: 20
      NOTIFICATION_ERROR_SERVICE_URL: http://notification-error-service:8080
      OPS_GATEWAY_URL: http://ops-gateway:8080
    ports:
      - "8090:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  template-generator:
    build:
      context: ./services/template-generator
      dockerfile: Dockerfile
    environment:
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-small-latest}
    ports:
      - "8091:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: norify-frontend:latest
    restart: unless-stopped
    build:
      context: ./apps/frontend
    ports:
      - "3000:80"
