apiVersion: apps/v1
kind: Deployment
metadata:
  name: sender-worker
  namespace: norify
spec:
  replicas: 3
  selector: {matchLabels: {app: sender-worker}}
  template:
    metadata: {labels: {app: sender-worker}}
    spec:
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command: ["sh", "-c", "until pg_isready -h postgres -U norify -d norify; do sleep 2; done"]
        - name: wait-rabbitmq
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z rabbitmq 5672; do sleep 2; done"]
      containers:
        - name: worker
          image: norify-sender-worker:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8080}]
          envFrom:
            - configMapRef: {name: norify-config}
            - secretRef: {name: norify-secret}
          env:
            - {name: WORKER_PREFETCH, value: "20"}
            - {name: WORKER_MIN_POOL, value: "1"}
            - {name: WORKER_MAX_POOL, value: "1"}
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            httpGet: {path: /health/live, port: 8080}
            periodSeconds: 2
            failureThreshold: 45
          livenessProbe: {httpGet: {path: /health/live, port: 8080}}
          readinessProbe: {httpGet: {path: /health/ready, port: 8080}}
---
apiVersion: v1
kind: Service
metadata:
  name: sender-worker
  namespace: norify
spec:
  selector: {app: sender-worker}
  ports: [{port: 8080, targetPort: 8080}]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ops-gateway
  namespace: norify
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sender-worker-scaler
  namespace: norify
rules:
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    resourceNames: ["sender-worker"]
    verbs: ["get", "patch"]
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    resourceNames: ["sender-worker"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["sender-worker"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ops-gateway-sender-worker-scaler
  namespace: norify
subjects:
  - kind: ServiceAccount
    name: ops-gateway
    namespace: norify
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sender-worker-scaler
---
