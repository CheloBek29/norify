apiVersion: apps/v1
kind: Deployment
metadata:
  name: sender-worker
  namespace: norify
spec:
  replicas: 3
  selector: {matchLabels: {app: sender-worker}}
  template:
    metadata: {labels: {app: sender-worker}}
    spec:
      containers:
        - name: worker
          image: norify/sender-worker:latest
          ports: [{containerPort: 8080}]
          envFrom:
            - configMapRef: {name: norify-config}
            - secretRef: {name: norify-secret}
          livenessProbe: {httpGet: {path: /health/live, port: 8080}}
          readinessProbe: {httpGet: {path: /health/ready, port: 8080}}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sender-worker
  namespace: norify
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sender-worker
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
