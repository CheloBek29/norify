apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: norify
spec:
  replicas: 2
  selector: {matchLabels: {app: auth-service}}
  template:
    metadata: {labels: {app: auth-service}}
    spec:
      containers:
        - name: service
          image: norify-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8080}]
          envFrom:
            - configMapRef: {name: norify-config}
            - secretRef: {name: norify-secret}
          livenessProbe: {httpGet: {path: /health/live, port: 8080}}
          readinessProbe: {httpGet: {path: /health/ready, port: 8080}}
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: norify
spec:
  selector: {app: auth-service}
  ports: [{port: 8080, targetPort: 8080}]
---
