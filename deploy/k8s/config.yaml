apiVersion: v1
kind: ConfigMap
metadata:
  name: norify-config
  namespace: norify-demo
data:
  POSTGRES_DSN: postgres://norify:norify@postgres:5432/norify?sslmode=disable
  RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
  REDIS_URL: redis://redis:6379/0
  AUTH_SERVICE_URL: http://auth-service:8080
  USER_SERVICE_URL: http://user-service:8080
  CAMPAIGN_SERVICE_URL: http://campaign-service:8080
  CHANNEL_SERVICE_URL: http://channel-service:8080
  TEMPLATE_SERVICE_URL: http://template-service:8080
  DISPATCHER_SERVICE_URL: http://dispatcher-service:8080
  SENDER_SERVICE_URL: http://sender-worker:8080
  STATS_SERVICE_URL: http://stats-service:8080
  TEMPLATE_GENERATOR_URL: http://template-generator:8003
  WORKER_CONTROL_MODE: kubernetes
  SENDER_WORKER_REPLICAS: "3"
  WORKER_CONTROL_MIN_REPLICAS: "1"
  WORKER_CONTROL_MAX_REPLICAS: "20"
  WORKER_K8S_DEPLOYMENT: sender-worker
  WORKER_K8S_HPA: sender-worker
  NOTIFICATION_ERROR_SERVICE_URL: http://notification-error-service:8080
  OPS_GATEWAY_URL: http://ops-gateway:8080
---
apiVersion: v1
kind: Secret
metadata:
  name: norify-secret
  namespace: norify-demo
type: Opaque
stringData:
  JWT_SECRET: change-me
