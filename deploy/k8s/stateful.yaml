apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: norify
spec:
  replicas: 1
  selector: {matchLabels: {app: postgres}}
  template:
    metadata: {labels: {app: postgres}}
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{containerPort: 5432}]
          env:
            - {name: POSTGRES_DB, value: norify}
            - {name: POSTGRES_USER, value: norify}
            - {name: POSTGRES_PASSWORD, value: norify}
          readinessProbe:
            exec: {command: ["pg_isready", "-U", "norify", "-d", "norify"]}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: norify
spec:
  selector: {app: postgres}
  ports: [{port: 5432, targetPort: 5432}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: norify
spec:
  replicas: 1
  selector: {matchLabels: {app: rabbitmq}}
  template:
    metadata: {labels: {app: rabbitmq}}
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports: [{containerPort: 5672}, {containerPort: 15672}]
          readinessProbe:
            exec: {command: ["rabbitmq-diagnostics", "ping"]}
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: norify
spec:
  selector: {app: rabbitmq}
  ports:
    - {name: amqp, port: 5672, targetPort: 5672}
    - {name: management, port: 15672, targetPort: 15672}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: norify
spec:
  replicas: 1
  selector: {matchLabels: {app: redis}}
  template:
    metadata: {labels: {app: redis}}
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{containerPort: 6379}]
          readinessProbe:
            exec: {command: ["redis-cli", "ping"]}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: norify
spec:
  selector: {app: redis}
  ports: [{port: 6379, targetPort: 6379}]

