apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: norify
spec:
  replicas: 1
  selector: {matchLabels: {app: postgres}}
  template:
    metadata: {labels: {app: postgres}}
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{containerPort: 5432}]
          env:
            - {name: POSTGRES_DB, value: norify}
            - {name: POSTGRES_USER, value: norify}
            - {name: POSTGRES_PASSWORD, value: norify}
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
          volumeMounts:
            - {name: postgres-data, mountPath: /var/lib/postgresql/data}
          readinessProbe:
            exec: {command: ["pg_isready", "-U", "norify", "-d", "norify"]}
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: norify
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: norify
spec:
  selector: {app: postgres}
  ports: [{port: 5432, targetPort: 5432}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: norify
spec:
  replicas: 1
  selector: {matchLabels: {app: rabbitmq}}
  template:
    metadata: {labels: {app: rabbitmq}}
    spec:
      securityContext:
        fsGroup: 101
      initContainers:
        - name: rabbitmq-data-permissions
          image: rabbitmq:3.13-management-alpine
          command: ["sh", "-c", "chown -R 100:101 /var/lib/rabbitmq && chmod 1777 /var/lib/rabbitmq"]
          volumeMounts:
            - {name: rabbitmq-data, mountPath: /var/lib/rabbitmq}
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management-alpine
          ports: [{containerPort: 5672}, {containerPort: 15672}]
          env:
            - {name: RABBITMQ_ERLANG_COOKIE, value: norify-local-cookie}
          volumeMounts:
            - {name: rabbitmq-data, mountPath: /var/lib/rabbitmq}
          readinessProbe:
            exec: {command: ["rabbitmq-diagnostics", "ping"]}
            initialDelaySeconds: 20
            timeoutSeconds: 5
            failureThreshold: 12
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-data
  namespace: norify
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: norify
spec:
  selector: {app: rabbitmq}
  ports:
    - {name: amqp, port: 5672, targetPort: 5672}
    - {name: management, port: 15672, targetPort: 15672}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: norify
spec:
  replicas: 1
  selector: {matchLabels: {app: redis}}
  template:
    metadata: {labels: {app: redis}}
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{containerPort: 6379}]
          readinessProbe:
            exec: {command: ["redis-cli", "ping"]}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: norify
spec:
  selector: {app: redis}
  ports: [{port: 6379, targetPort: 6379}]
